name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: next-dashboard/package-lock.json
      - run: npm ci
        working-directory: next-dashboard
      - run: npm run lint
        working-directory: next-dashboard
      - run: npm run build
        working-directory: next-dashboard
      - run: npx next export
        working-directory: next-dashboard
      - uses: actions/upload-pages-artifact@v3
        with:
          path: next-dashboard/out
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
