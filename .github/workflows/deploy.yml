# DISABLED: Using Vercel Git Integration instead
# This workflow is disabled because Vercel Git integration handles automatic deployment
# Deploy hook: https://api.vercel.com/v1/integrations/deploy/prj_DSmy4FBhYDJiUQr6YbNsXg3Nw7gt/xyCW8UBEuO

name: Deploy to Vercel (DISABLED)

on:
  workflow_dispatch:  # Manual trigger only
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: next-dashboard/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit
        working-directory: next-dashboard

      - name: Run linting
        run: npm run lint
        working-directory: next-dashboard

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: next-dashboard

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: next-dashboard

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: next-dashboard

      - name: Test API Proxy Health
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30

          # Get the deployment URL from Vercel
          DEPLOYMENT_URL=$(vercel ls --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} | grep "finance-factors" | head -1 | awk '{print $2}')

          if [ -n "$DEPLOYMENT_URL" ]; then
            echo "Testing API proxy health at: https://$DEPLOYMENT_URL"

            # Test health endpoint
            HEALTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://$DEPLOYMENT_URL/api/proxy/health" || echo "000")

            if [ "$HEALTH_RESPONSE" = "200" ]; then
              echo "✅ API proxy health check passed"
            else
              echo "❌ API proxy health check failed (HTTP $HEALTH_RESPONSE)"
              exit 1
            fi

            # Test data endpoint
            DATA_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://$DEPLOYMENT_URL/api/proxy/data?source=fred&series=MSPUS" || echo "000")

            if [ "$DATA_RESPONSE" = "200" ]; then
              echo "✅ API proxy data endpoint test passed"
            else
              echo "⚠️  API proxy data endpoint test failed (HTTP $DATA_RESPONSE) - may be due to API rate limits"
            fi
          else
            echo "⚠️  Could not determine deployment URL for testing"
          fi
        working-directory: next-dashboard
