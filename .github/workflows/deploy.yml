name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# Cancel in-progress runs for the same branch (e.g. rapid pushes)
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: next-dashboard/package-lock.json

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: next-dashboard/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('next-dashboard/package-lock.json', 'next-dashboard/next.config.ts') }}
          restore-keys: |
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run linting
        run: npm run lint

      - name: Install Vercel CLI
        run: npm install --global vercel@50

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ github.event_name == 'push' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build ${{ github.event_name == 'push' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "Deploying to production..."
            RAW=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            echo "Deploying preview for PR..."
            RAW=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          DEPLOYMENT_URL=$(echo "$RAW" | tail -1 | xargs)
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Deployment URL: $DEPLOYMENT_URL"

      - name: Test Deployment
        if: github.event_name == 'push'
        env:
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          DEPLOYMENT_URL="${{ steps.deploy.outputs.deployment_url }}"
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "::error::Could not determine deployment URL"
            exit 1
          fi

          # Optional: bypass Vercel Deployment Protection in CI (401 without this)
          CURL_OPTS=()
          if [ -n "$VERCEL_AUTOMATION_BYPASS_SECRET" ]; then
            CURL_OPTS+=(-H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET")
          fi

          echo "Waiting for deployment to be ready..."
          MAX_ATTEMPTS=15
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "${CURL_OPTS[@]}" "$DEPLOYMENT_URL" || echo "000")
            if [ "$CODE" = "200" ]; then
              echo "Deployment ready after ${ATTEMPT} attempts"
              break
            fi
            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
              echo "::error::Deployment did not return 200 after ${MAX_ATTEMPTS} attempts (last HTTP $CODE)"
              echo "::notice::If you use Vercel Deployment Protection, add VERCEL_AUTOMATION_BYPASS_SECRET to GitHub Secrets (Project → Settings → Deployment Protection → Bypass for Automation)"
              exit 1
            fi
            sleep 5
          done

          echo "Testing deployment at: $DEPLOYMENT_URL"
          MAIN_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${CURL_OPTS[@]}" "$DEPLOYMENT_URL" || echo "000")
          HEALTH_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "${CURL_OPTS[@]}" "$DEPLOYMENT_URL/api/proxy/health" || echo "000")

          FAILED=0
          if [ "$MAIN_RESPONSE" != "200" ]; then
            echo "::error::Main page failed (HTTP $MAIN_RESPONSE)"
            FAILED=1
          else
            echo "✅ Main page accessible"
          fi
          if [ "$HEALTH_RESPONSE" != "200" ]; then
            echo "::error::API proxy health check failed (HTTP $HEALTH_RESPONSE)"
            FAILED=1
          else
            echo "✅ API proxy health check passed"
          fi

          if [ $FAILED -eq 1 ]; then
            exit 1
          fi
          echo "🎉 Deployment completed successfully!"
          echo "🔗 Live URL: $DEPLOYMENT_URL"

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy.outputs.deployment_url }}';
            if (deploymentUrl) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 **Preview deployment ready!**\n\n📱 **Live Preview:** ${deploymentUrl}\n\n🔍 **API Health:** ${deploymentUrl}/api/proxy/health`
              });
            }
